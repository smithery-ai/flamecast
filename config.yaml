# Flamecast server config
stateManager: psql

# Provisioner — how agent processes are created per-connection.
# - local: child_process.spawn() (default)
# - docker: container per-connection from a pre-built image (alchemy)
# - remote: connect to an already-running agent via TCP
provisioner:
  type: docker
  image: flamecast/example-agent:gnijor
  network: flamecast-agents-gnijor

# Workspace directory mounted into containers for filesystem access
workspaceDir: ./workspace
