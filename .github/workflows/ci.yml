name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run lint and format checks
        run: pnpm run ci:lint

  knip:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run knip
        run: pnpm run knip

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Run Chat SDK plugin tests
        run: pnpm --filter @flamecast/plugin-chat-sdk test

      - name: Run Flamecast coverage
        run: pnpm run test:api:coverage
        env:
          ALCHEMY_CI_STATE_STORE_CHECK: "false"

      - name: Run server tests
        run: pnpm run test:server

  check:
    runs-on: ubuntu-latest
    needs:
      - lint
      - knip
      - test
    if: ${{ always() }}

    steps:
      - name: Verify required jobs passed
        run: |
          echo "lint: ${{ needs.lint.result }}"
          echo "knip: ${{ needs.knip.result }}"
          echo "test: ${{ needs.test.result }}"
          [ "${{ needs.lint.result }}" = "success" ] && [ "${{ needs.knip.result }}" = "success" ] && [ "${{ needs.test.result }}" = "success" ]
