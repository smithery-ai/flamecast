name: Alpha Release

on:
  push:
    branches: [main]

concurrency:
  group: alpha-release
  cancel-in-progress: true

jobs:
  alpha-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set alpha versions
        run: node .github/scripts/set-alpha-versions.mjs
        env:
          COMMIT_SHA: ${{ github.sha }}

      - name: Build
        run: pnpm turbo run build

      - name: Publish alpha
        run: pnpm publish -r --tag alpha --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
