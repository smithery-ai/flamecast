name = "flamecast-cloudflare"
main = "src/worker.ts"
compatibility_date = "2026-03-27"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.txt"]
fallthrough = false

# Create your Hyperdrive instance first:
#   npx wrangler hyperdrive create flamecast-db \
#     --connection-string="postgres://user:password@host:5432/dbname"
#
# Then paste the returned ID below.
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "<your-hyperdrive-id>"
